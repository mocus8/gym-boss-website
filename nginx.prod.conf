# Один worker обрабатывает 1024 подключений, улучшает производительность
events {
    worker_connections 1024;
}

# Полная конфигурация веб-сервера Nginx
http {
    # Подгружаем типы MIME (правильный Content-Type) для корректной отдачи CSS/JS и других файлов
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Настройки ограничения количества запросов от IP адреса
    limit_req_zone $binary_remote_addr zone=public_zone:10m rate=10r/s;    # публичные страницы (HTML, картинки и т.п.)
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=2r/s;    # api и чуствительные операции (логин, checkout, ajax-запросы)
    limit_req_status 429;    # если запрос упирается в это ограничение - ответом будет 429 статус

    # Глобальные настройки gzip (для всех серверов)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # HTTP-сервер - настройка Let's Encrypt, helthcheck, редирект на HTTPS
    server {
        listen 80;
        server_name gymboss.mocus8.ru;

        # ACME challenge - для проверки домена перед выдачей SSL-сертификата
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Healthcheck endpoint
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Все остальные HTTP-запросы - редирект на HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS-сервер - основная логика сайта
    server {
        listen 443 ssl;
        http2 on;
        server_name gymboss.mocus8.ru;

        # SSL-сертификаты от Let's Encrypt
        ssl_certificate /etc/letsencrypt/live/gymboss.mocus8.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gymboss.mocus8.ru/privkey.pem;

        # SSL best practices
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Базовые настройки
        server_tokens off; # Скрыть версию Nginx
        add_header X-Robots-Tag "none" always; # Анти-бот заголовки
        root /var/www/html/public;
        index index.php index.html;

        # Логи доступа и ошибок
        access_log /dev/stdout;
        error_log  /dev/stderr warn;

        # Healthcheck endpoint
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Динамический robots.txt через robots.php
        location = /robots.txt {
            access_log off;
            log_not_found off;

            include fastcgi_params;
            fastcgi_pass php:9000;
            fastcgi_param SCRIPT_FILENAME $document_root/robots.php;
            fastcgi_param HTTPS on;
        }

        # Для уведомлений к вебхуку по оплате делаем лист ограничиных доверенных ip
        location = /webhook/yookassa {
            allow 185.71.76.0/27;
            allow 185.71.77.0/27;
            allow 77.75.153.0/25;
            allow 77.75.154.128/25;
            allow 77.75.156.11;
            allow 77.75.156.35;
            allow 2a02:5180::/32;
            deny all;

            try_files $uri /index.php?$query_string;
        }

        # Все запросы перенаправляются на index.php (единая точка входа)
        location / {
            limit_req zone=public_zone burst=10 nodelay;    # применяем ограничение по public_zone
            try_files $uri $uri/ /index.php?$query_string;    # перенаправляем на index.php
        }

        # API-запросы
        location ^~ /api/ {
            limit_req zone=api_zone burst=10 nodelay;    # применяем ограничение по api_zone
            try_files $uri $uri/ /index.php?$query_string;    # перенаправляем на index.php
        }

        # Обработка всех PHP файлов
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass php:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTPS on;

            # Таймауты для выполнения PHP
            fastcgi_read_timeout 60;
            fastcgi_send_timeout 60;
        }

        # Для css и js кеш хранится, но проверяется актуальность у сервера
        location ~* \.(css|js)$ {
            expires -1;
            add_header Cache-Control "no-cache" always;
            add_header X-Content-Type-Options nosniff;
            try_files $uri =404;
        }

        # Сохранение статических файлов в кеше сервера на год
        location ~* \.(png|jpg|jpeg|ico|svg|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options nosniff;
            try_files $uri =404;
        }

        # Запрет доступа к важным файлам начинающимся с точки
        location ~ /\. {
            deny all;
            return 404;
        }

        # Настраиваем безопасные заголовки (Response headers, от сервера к браузеру), для защиты от атак
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'self'; script-src 'self' https://www.google.com https://www.gstatic.com https://api-maps.yandex.ru https://core-renderer-tiles.maps.yandex.net https://yastatic.net; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: https://*.maps.yandex.net https://api-maps.yandex.ru; font-src 'self' data:; connect-src 'self' https://www.google.com https://www.gstatic.com https://api-maps.yandex.ru https://log.api-maps.yandex.ru https://*.maps.yandex.net https://suggestions.dadata.ru https://yookassa.ru; frame-src 'self' https://www.google.com https://www.gstatic.com;" always;
        # Тоже самое, но в читаемомо виде (для http2 переносы вызывают warning-и):
        # add_header Content-Security-Policy "
        #     default-src 'self';
        #     base-uri 'self';
        #     object-src 'none';
        #     form-action 'self';
        #     frame-ancestors 'self';
        #     script-src
        #         'self'
        #         https://www.google.com
        #         https://www.gstatic.com
        #         https://api-maps.yandex.ru
        #         https://core-renderer-tiles.maps.yandex.net
        #         https://yastatic.net;
        #     script-src-attr 'none';
        #     style-src
        #         'self'
        #         'unsafe-inline';
        #     img-src
        #         'self'
        #         data:
        #         https:
        #         https://*.maps.yandex.net
        #         https://api-maps.yandex.ru;
        #     font-src
        #         'self'
        #         data:;
        #     connect-src
        #         'self'
        #         https://www.google.com
        #         https://www.gstatic.com
        #         https://api-maps.yandex.ru
        #         https://log.api-maps.yandex.ru
        #         https://*.maps.yandex.net
        #         https://suggestions.dadata.ru
        #         https://yookassa.ru;
        #     frame-src
        #         'self'
        #         https://www.google.com
        #         https://www.gstatic.com;
        # " always;
    }
}