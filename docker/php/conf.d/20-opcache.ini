; =================================
; OPcache — кэш скомпилированного PHP-байткода
; =================================

opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000

; Проверка изменений файлов
; 1 = проверять (для разработки), 0 = доверять кэшу (для прода)
opcache.validate_timestamps = ${OPCACHE_VALIDATE_TIMESTAMPS}

; Если проверка включена — как часто проверять, в секундах
opcache.revalidate_freq = 0

; Ускоренное освобождение памяти после запроса
opcache.fast_shutdown = 1