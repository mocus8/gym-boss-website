services:
    nginx:
        image: nginx:alpine
        ports:
            - "80:80" # http, для для редиректа на https
            - "443:443" # https
        volumes:
            - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro # Конфиг Nginx
            - /etc/letsencrypt:/etc/letsencrypt:ro # letsencrypt для SSL сертификатов
            - certbot_webroot:/var/www/certbot # certbot для подтверждения домена для Let's Encrypt
        depends_on:
            php:
                condition: service_healthy
        restart: unless-stopped
        healthcheck: # Автоматическая проверка "жив ли контейнер"
            test:
                [
                    "CMD",
                    "wget",
                    "--quiet",
                    "--tries=1",
                    "--spider",
                    "http://localhost/health",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
        networks:
            - gymboss
    php:
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - ./storage:/var/www/html/storage
            - php_sessions:/tmp/php-sessions
        environment:
            - APP_ENV=${APP_ENV}
            - APP_URL=${APP_URL}
            - APP_DEBUG=${APP_DEBUG}
            - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE}
            - LOG_FILE=${LOG_FILE}
            - LOG_LEVEL=${LOG_LEVEL}
            - OPCACHE_VALIDATE_TIMESTAMPS=${OPCACHE_VALIDATE_TIMESTAMPS}
            - DB_HOST=${DB_HOST}
            - DB_NAME=${DB_NAME}
            - DB_USER=${DB_USER}
            - DB_PASS=${DB_PASS}
            - ENCRYPTION_KEY=${ENCRYPTION_KEY}
            - DADATA_API_KEY=${DADATA_API_KEY}
            - YANDEX_MAPS_KEY=${YANDEX_MAPS_KEY}
            - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
            - YOOKASSA_API_KEY=${YOOKASSA_API_KEY}
            - GOOGLE_RECAPTCHA_SITE_KEY=${GOOGLE_RECAPTCHA_SITE_KEY}
            - GOOGLE_RECAPTCHA_SECRET_KEY=${GOOGLE_RECAPTCHA_SECRET_KEY}
            - RESEND_API_KEY=${RESEND_API_KEY}
            - MAIL_FROM_EMAIL=${MAIL_FROM_EMAIL}
            - MAIL_FROM_NAME=${MAIL_FROM_NAME}
            - MAIL_REPLY_TO=${MAIL_REPLY_TO}
        depends_on:
            mysql:
                condition: service_healthy
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "php-fpm -t"]
            interval: 30s
            timeout: 10s
            retries: 3
        networks:
            - gymboss

    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        ports:
            - "127.0.0.1:3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
            - ./db:/docker-entrypoint-initdb.d:ro # Здесь dump.sql
        restart: unless-stopped
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-u",
                    "${MYSQL_USER}",
                    "-p${MYSQL_PASSWORD}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - gymboss

volumes:
    mysql_data:
    php_sessions:
    certbot_webroot:

# Определение сети для взаимодействия 3 контейнеров (nginx, php, mysql)
networks:
    gymboss:
        driver: bridge
