services:
    nginx:
        image: nginx:alpine
        ports:
            - "80:80" # Сайт будет доступен по http://localhost
        volumes:
            - .:/var/www/html # Папка с index.php
            - ./nginx.conf:/etc/nginx/nginx.conf:ro # Конфиг Nginx
            - nginx_logs:/var/log/nginx # Логи сохраняются
        depends_on:
            php:
                condition: service_healthy
        restart: unless-stopped
        healthcheck: # Автоматическая проверка "жив ли контейнер"
            test: ["CMD", "curl", "-f", "http://localhost"]
            interval: 30s
            timeout: 10s
            retries: 3
        networks:
            - gymboss
    php:
        build: .
        volumes:
            - .:/var/www/html
            - ./docker/php/conf.d:/usr/local/etc/php/conf.d
            - php_sessions:/tmp/php-sessions
            - php_logs:/var/log
        environment:
            - ENCRYPTION_KEY=${ENCRYPTION_KEY}
        depends_on:
            mysql:
                condition: service_healthy
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "php-fpm -t"]
            interval: 30s
            timeout: 10s
            retries: 3
        networks:
            - gymboss

    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
            - ./db:/docker-entrypoint-initdb.d # Здесь dump.sql
        restart: unless-stopped
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-u",
                    "${MYSQL_USER}",
                    "-p${MYSQL_PASSWORD}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - gymboss

volumes:
    mysql_data:
    nginx_logs:
    php_sessions:
    php_logs:

# Определение сети для взаимодействия 3 контейнеров (nginx, php, mysql)
networks:
    gymboss:
        driver: bridge
